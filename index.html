<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gofile Album Wall</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

#controls{
text-align:center;
margin-bottom:20px;
}

input{
padding:10px;
width:420px;
}

button{
padding:10px;
}

#error{
background:#ff4444;
padding:10px;
display:none;
margin-top:10px;
}

#grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
margin-top:20px;
}

video{
width:100%;
}

</style>

</head>

<body>

<h1>Gofile Album Video Wall</h1>

<div id="controls">

<input id="album" placeholder="Paste Gofile album link">

<button onclick="loadAlbum()">Load</button>

<div id="error"></div>

</div>

<div id="grid"></div>

<script>

function error(msg){
let e=document.getElementById("error")
e.style.display="block"
e.innerText=msg
}

async function loadAlbum(){

document.getElementById("error").style.display="none"

const link=document.getElementById("album").value.trim()

if(!link){
error("No album link provided")
return
}

let id

try{
id=link.split("/").pop()
}catch{
error("Invalid link")
return
}

try{

const proxy="https://api.allorigins.win/raw?url="

const res=await fetch(proxy+"https://gofile.io/d/"+id)

const html=await res.text()

const matches=[...html.matchAll(/https:\/\/store\d+\.gofile\.io\/download\/[^"]+/g)]

if(matches.length==0){
error("No videos found. Album may be private.")
return
}

const grid=document.getElementById("grid")

grid.innerHTML=""

matches.forEach(m=>{

const url=m[0]

const v=document.createElement("video")

v.src=url
v.controls=true

grid.appendChild(v)

})

}catch(e){

error("Failed to load album: "+e)

}

}

</script>

</body>
</html>
