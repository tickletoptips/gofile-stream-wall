<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gofile Album Viewer</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
padding:20px;
}

h1{text-align:center}

#controls{text-align:center;margin-bottom:20px}

input{
padding:10px;
width:420px;
border-radius:6px;
border:none;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
cursor:pointer;
}

#error{
background:#ff4d4d;
padding:10px;
margin:10px auto;
max-width:700px;
display:none;
border-radius:6px;
}

#status{
text-align:center;
margin-top:10px;
opacity:.8;
}

#grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:20px;
margin-top:20px;
}

video{
width:100%;
border-radius:6px;
}

</style>
</head>

<body>

<h1>Gofile Album Viewer</h1>

<div id="controls">

<input id="album" placeholder="Paste Gofile album link">

<button onclick="loadAlbum()">Load Album</button>

</div>

<div id="error"></div>
<div id="status"></div>

<div id="grid"></div>

<script>

function showError(msg){
const box=document.getElementById("error")
box.style.display="block"
box.innerText=msg
}

function clearError(){
const box=document.getElementById("error")
box.style.display="none"
}

async function getToken(){

const res=await fetch("https://api.gofile.io/accounts")

const data=await res.json()

if(data.status!="ok") throw "Token request failed"

return data.data.token

}

async function loadAlbum(){

clearError()

const status=document.getElementById("status")
const grid=document.getElementById("grid")

grid.innerHTML=""
status.innerText="Getting token..."

let link=document.getElementById("album").value.trim()

if(!link){
showError("Please paste a Gofile album link.")
return
}

let id

try{
id=link.split("/").pop()
}catch{
showError("Could not read album ID.")
return
}

try{

const token=await getToken()

status.innerText="Loading album..."

const api=`https://api.gofile.io/contents/${id}?token=${token}`

const res=await fetch(api)

if(!res.ok){
showError("Network error "+res.status)
return
}

const data=await res.json()

console.log(data)

if(data.status!="ok"){
showError("API error: "+data.status)
return
}

const files=data.data.contents

let count=0

for(const key in files){

const file=files[key]

if(file.type!="file") continue

const video=document.createElement("video")

video.src=file.link
video.controls=true

grid.appendChild(video)

count++

}

if(count===0){
showError("Album loaded but no playable files found.")
}else{
status.innerText="Loaded "+count+" videos"
}

}catch(err){

console.error(err)
showError("Unexpected error: "+err)

}

}

</script>

</body>
</html>
