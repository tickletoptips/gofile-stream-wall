<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gofile Album Wall</title>

<style>

body{
background:#0f0f0f;
font-family:Arial;
margin:0;
padding:20px;
color:white;
}

h1{
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
grid-gap:20px;
}

.card{
background:#1a1a1a;
padding:10px;
border-radius:10px;
}

video{
width:100%;
border-radius:8px;
}

.name{
margin-top:8px;
font-size:14px;
opacity:.8;
}

</style>
</head>

<body>

<h1>Gofile Album Preview</h1>

<div id="grid" class="grid"></div>

<script>

const albumID = "wFO7WM"

const WORKER = "https://gofile-proxy.tickletoptips.workers.dev"

async function loadAlbum(){

const res = await fetch(`${WORKER}/album?id=${albumID}`)
const data = await res.json()

const files = data.data.contents

const grid = document.getElementById("grid")

for(const key in files){

const file = files[key]

if(file.type !== "file") continue

const card = document.createElement("div")
card.className = "card"

const video = document.createElement("video")

video.src = `${WORKER}/file?url=${encodeURIComponent(file.link)}`
video.controls = true
video.preload = "metadata"

const name = document.createElement("div")
name.className = "name"
name.textContent = file.name

card.appendChild(video)
card.appendChild(name)

grid.appendChild(card)

}

}

loadAlbum()

</script>

</body>
</html>
