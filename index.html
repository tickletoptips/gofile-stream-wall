<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gofile Album Viewer</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

#controls{
text-align:center;
margin-bottom:20px;
}

input{
padding:10px;
width:420px;
border-radius:6px;
border:none;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
cursor:pointer;
}

#grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
margin-top:20px;
}

video{
width:100%;
border-radius:6px;
}

#error{
background:#ff4d4d;
padding:12px;
border-radius:6px;
margin:10px auto;
max-width:700px;
display:none;
}

#status{
text-align:center;
margin-top:10px;
opacity:.8;
}

</style>
</head>

<body>

<h1>Gofile Album Viewer</h1>

<div id="controls">

<input id="album" placeholder="Paste Gofile album link">

<button onclick="loadAlbum()">Load Album</button>

</div>

<div id="error"></div>

<div id="status"></div>

<div id="grid"></div>

<script>

function showError(msg){

const box=document.getElementById("error")
box.style.display="block"
box.innerText=msg

}

function clearError(){

const box=document.getElementById("error")
box.style.display="none"
box.innerText=""

}

async function loadAlbum(){

clearError()

const status=document.getElementById("status")
const grid=document.getElementById("grid")

grid.innerHTML=""
status.innerText="Loading album..."

let input=document.getElementById("album").value.trim()

if(!input){
showError("No album link entered.")
return
}

let id

try{

id=input.split("/").pop()

if(id.length<4) throw "Invalid album ID"

}catch(e){

showError("Could not parse album ID from link.")
return

}

try{

const api="https://api.gofile.io/contents/"+id+"?wt=4fd6sg89d7s6"

const response=await fetch(api)

if(!response.ok){

showError("Network error: "+response.status)
return

}

const data=await response.json()

console.log("API response:",data)

if(data.status!=="ok"){

showError("API error: "+data.status)
return

}

if(!data.data || !data.data.contents){

showError("Album has no contents.")
return

}

const files=data.data.contents

let count=0

for(const key in files){

const file=files[key]

if(file.type!=="file") continue

const video=document.createElement("video")

video.src=file.link
video.controls=true

grid.appendChild(video)

count++

}

if(count===0){

showError("Album loaded but contains no playable video files.")

}else{

status.innerText="Loaded "+count+" videos."

}

}catch(err){

console.error(err)

showError("Unexpected error: "+err)

}

}

</script>

</body>
</html>
