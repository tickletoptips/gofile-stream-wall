<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gofile Album Viewer</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

#input{
text-align:center;
margin-bottom:20px;
}

input{
padding:10px;
width:400px;
}

button{
padding:10px;
}

#grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

video{
width:100%;
}

</style>
</head>

<body>

<h1>Gofile Album Viewer</h1>

<div id="input">

<input id="album" placeholder="Paste Gofile album link">

<button onclick="loadAlbum()">Load</button>

</div>

<div id="grid"></div>

<script>

async function loadAlbum(){

let url=document.getElementById("album").value

let id=url.split("/").pop()

let api="https://api.gofile.io/contents/"+id+"?wt=4fd6sg89d7s6"

let res=await fetch(api)

let data=await res.json()

let grid=document.getElementById("grid")

grid.innerHTML=""

let files=data.data.contents

for(let key in files){

let f=files[key]

if(f.type!="file") continue

let video=document.createElement("video")

video.src=f.link

video.controls=true

grid.appendChild(video)

}

}

</script>

</body>
</html>
