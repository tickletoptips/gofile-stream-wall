<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Gofile Streaming Wall</title>

<style>

body{
background:#0f0f0f;
font-family:Arial;
margin:0;
padding:30px;
color:white;
}

h1{
text-align:center;
margin-bottom:30px;
}

.grid{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
grid-gap:20px;

}

.card{

background:#1a1a1a;
border-radius:12px;
padding:10px;
transition:transform .2s;

}

.card:hover{
transform:scale(1.03);
}

video{

width:100%;
border-radius:10px;

}

.name{

margin-top:8px;
font-size:14px;
opacity:.8;
word-break:break-all;

}

</style>

</head>

<body>

<h1>Gofile Album Wall</h1>

<div id="grid" class="grid"></div>

<script>

const WORKER = "https://gofile-proxy.tickletoptips.workers.dev"

const ALBUM = "wFO7WM"

async function loadAlbum(){

const res = await fetch(`${WORKER}/album?id=${ALBUM}`)

const data = await res.json()

const contents = data.data.contents

const grid = document.getElementById("grid")

for(const key in contents){

const file = contents[key]

if(file.type !== "file") continue

const card = document.createElement("div")
card.className = "card"

const video = document.createElement("video")

video.src = `${WORKER}/file?url=${encodeURIComponent(file.link)}`
video.controls = true
video.preload = "metadata"

const name = document.createElement("div")
name.className = "name"
name.textContent = file.name

card.appendChild(video)
card.appendChild(name)

grid.appendChild(card)

}

}

loadAlbum()

</script>

</body>
</html>
